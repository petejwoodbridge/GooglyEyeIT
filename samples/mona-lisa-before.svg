<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#2c1810"/>
  <!-- Frame -->
  <rect x="15" y="15" width="370" height="470" fill="#8B7355" rx="5"/>
  <rect x="25" y="25" width="350" height="450" fill="#3d2b1f" rx="3"/>
  <!-- Background landscape -->
  <path d="M25 300 Q100 250 180 280 Q250 250 350 290 L375 475 L25 475 Z" fill="#4a6741"/>
  <path d="M25 280 Q150 220 250 260 Q320 240 375 270 L375 300 Q250 270 180 300 Q100 270 25 320 Z" fill="#6b8f71"/>
  <!-- Sky -->
  <rect x="25" y="25" width="350" height="260" fill="#87a5b0" rx="3"/>
  <!-- Figure silhouette -->
  <ellipse cx="200" cy="180" rx="60" ry="70" fill="#c4956a"/>
  <!-- Hair -->
  <path d="M140 160 Q140 100 200 90 Q260 100 260 160 Q255 180 250 200 L245 210 Q240 170 200 165 Q160 170 155 210 L150 200 Q145 180 140 160Z" fill="#2c1810"/>
  <!-- Simple face features -->
  <ellipse cx="185" cy="170" rx="8" ry="5" fill="#2c1810"/>
  <ellipse cx="215" cy="170" rx="8" ry="5" fill="#2c1810"/>
  <!-- Nose -->
  <path d="M197 180 Q200 188 203 180" stroke="#8B6914" fill="none" stroke-width="1.5"/>
  <!-- Famous smile -->
  <path d="M185 195 Q200 205 215 195" stroke="#8B6914" fill="none" stroke-width="2"/>
  <!-- Body/dress -->
  <path d="M155 220 Q150 300 130 400 L270 400 Q250 300 245 220 Q220 210 200 210 Q180 210 155 220Z" fill="#3d2b1f"/>
  <!-- Hands -->
  <ellipse cx="160" cy="320" rx="25" ry="15" fill="#c4956a" transform="rotate(-10 160 320)"/>
  <ellipse cx="240" cy="310" rx="25" ry="15" fill="#c4956a" transform="rotate(10 240 310)"/>
  <!-- Label -->
  <text x="200" y="490" text-anchor="middle" fill="#ddd" font-family="serif" font-size="14" font-style="italic">Before: Just a painting</text>
</svg>
