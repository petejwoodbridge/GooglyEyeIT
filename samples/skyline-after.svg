    <rect x="360" y="140" width="5" height="3" fill="#ffd700" opacity="0.9"/>
    <rect x="348" y="170" width="5" height="3" fill="#ffd700" opacity="0.7"/>
    <rect x="336" y="200" width="5" height="3" fill="#ffd700" opacity="0.5"/>
    <rect x="360" y="200" width="5" height="3" fill="#ffd700" opacity="0.8"/>
    <rect x="348" y="230" width="5" height="3" fill="#ffd700" opacity="0.4"/>
