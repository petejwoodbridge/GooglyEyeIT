<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="skyGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="40%" style="stop-color:#2d1b69"/>
      <stop offset="70%" style="stop-color:#e8734a"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="bldg1b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2a2a3e"/>
    </linearGradient>
    <linearGradient id="bldg2b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="waterGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8734a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1a0533;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="gEyeDrop">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#skyGrad3)"/>
  <circle cx="50" cy="30" r="1" fill="white" opacity="0.8"/>
  <circle cx="120" cy="15" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="45" r="1" fill="white" opacity="0.7"/>
  <circle cx="450" cy="25" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="530" cy="50" r="1" fill="white" opacity="0.8"/>
  <rect x="0" y="300" width="600" height="100" fill="url(#waterGrad2)"/>
  <line x1="50" y1="320" x2="90" y2="320" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="340" x2="260" y2="340" stroke="#e8734a" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="330" x2="450" y2="330" stroke="#f5a623" stroke-width="1" opacity="0.25"/>
