  <!-- Far building eyes -->
  <circle cx="33" cy="245" r="8" fill="white" stroke="#555" stroke-width="1.5" filter="url(#gEyeDrop)"/>
  <circle cx="30" cy="248" r="4" fill="#111"/>
  <circle cx="50" cy="243" r="9" fill="white" stroke="#555" stroke-width="1.5" filter="url(#gEyeDrop)"/>
  <circle cx="53" cy="246" r="4.5" fill="#111"/>
  <!-- Main buildings -->
  <!-- Tall skyscraper left -->
  <rect x="120" y="100" width="50" height="200" fill="url(#bldg1b)"/>
  <rect x="125" y="80" width="40" height="25" fill="#1a1a2e"/>
  <line x1="145" y1="80" x2="145" y2="60" stroke="#555" stroke-width="3"/>
  <circle cx="145" cy="57" r="3" fill="#e94560" opacity="0.8"/>
