  </g>
  <!-- Right building -->
  <rect x="400" y="180" width="60" height="120" fill="url(#bldg1b)"/>
  <!-- GOOGLY EYES on right building -->
  <g filter="url(#gEyeDrop)">
    <circle cx="418" cy="210" r="16" fill="white" stroke="#555" stroke-width="2"/>
    <circle cx="413" cy="215" r="8" fill="#111"/>
    <circle cx="412" cy="204" r="3" fill="white" opacity="0.6"/>
  </g>
  <g filter="url(#gEyeDrop)">
