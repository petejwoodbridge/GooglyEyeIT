  <circle cx="145" cy="330" r="8" fill="white" opacity="0.2" stroke="#555" stroke-width="0.5"/>
  <circle cx="143" cy="333" r="4" fill="#111" opacity="0.15"/>
  <circle cx="162" cy="328" r="9" fill="white" opacity="0.2" stroke="#555" stroke-width="0.5"/>
  <circle cx="165" cy="331" r="4.5" fill="#111" opacity="0.15"/>
  <circle cx="350" cy="325" r="7" fill="white" opacity="0.2" stroke="#555" stroke-width="0.5"/>
  <circle cx="348" cy="328" r="3.5" fill="#111" opacity="0.15"/>
  <circle cx="365" cy="323" r="8" fill="white" opacity="0.2" stroke="#555" stroke-width="0.5"/>
  <circle cx="368" cy="326" r="4" fill="#111" opacity="0.15"/>
  <text x="300" y="385" text-anchor="middle" fill="#4ecca3" font-family="sans-serif" font-size="13" font-weight="bold">After: THE BUILDINGS ARE ALIVE</text>
</svg>
