<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#87ceeb"/>
  <!-- Sun with eyes -->
  <circle cx="330" cy="70" r="40" fill="#FFD700"/>
  <circle cx="318" cy="62" r="12" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="315" cy="66" r="6" fill="#111"/>
  <circle cx="342" cy="60" r="13" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="346" cy="64" r="6.5" fill="#111"/>
  <path d="M322 80 Q330 88 340 80" stroke="#e94560" fill="none" stroke-width="2"/>
  <!-- Ground -->
  <rect x="0" y="280" width="400" height="120" fill="#4a7c3f"/>
  <!-- House body -->
  <rect x="100" y="180" width="200" height="120" fill="#d4956a" stroke="#8B6914" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="80,185 200,90 320,185" fill="#8B2500" stroke="#5a1a00" stroke-width="2"/>
  <!-- Door with eyes -->
  <rect x="175" y="230" width="50" height="70" fill="#5a3a1a" stroke="#3d2b1f" stroke-width="2"/>
  <circle cx="190" cy="250" r="9" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="188" cy="253" r="4.5" fill="#111"/>
  <circle cx="210" cy="248" r="10" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="213" cy="251" r="5" fill="#111"/>
  <circle cx="200" cy="270" r="6" fill="#FFD700"/>
  <!-- Windows ARE the eyes now -->
  <circle cx="140" cy="225" r="22" fill="white" stroke="#555" stroke-width="3"/>
  <circle cx="135" cy="230" r="11" fill="#111"/>
  <circle cx="132" cy="220" r="4" fill="white" opacity="0.6"/>
  <circle cx="260" cy="225" r="22" fill="white" stroke="#555" stroke-width="3"/>
  <circle cx="265" cy="230" r="11" fill="#111"/>
  <circle cx="262" cy="220" r="4" fill="white" opacity="0.6"/>
  <!-- House mouth -->
  <path d="M170 298 Q200 315 230 298" stroke="#e94560" fill="none" stroke-width="3" stroke-linecap="round"/>
  <!-- Cloud with eyes -->
  <g>
    <circle cx="80" cy="60" r="25" fill="white"/>
    <circle cx="105" cy="50" r="30" fill="white"/>
    <circle cx="135" cy="55" r="25" fill="white"/>
    <circle cx="110" cy="65" r="22" fill="white"/>
    <circle cx="95" cy="52" r="9" fill="white" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="92" cy="55" r="4.5" fill="#555"/>
    <circle cx="118" cy="50" r="10" fill="white" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="122" cy="53" r="5" fill="#555"/>
  </g>
  <!-- Tree with eyes -->
  <rect x="340" y="230" width="15" height="60" fill="#5a3a1a"/>
  <circle cx="347" cy="210" r="35" fill="#2d5a1e"/>
  <circle cx="335" cy="205" r="11" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="332" cy="208" r="5.5" fill="#111"/>
  <circle cx="358" cy="202" r="12" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="362" cy="205" r="6" fill="#111"/>
  <text x="200" y="385" text-anchor="middle" fill="#4ecca3" font-family="sans-serif" font-size="14" font-weight="bold">After: THE HOUSE IS WATCHING</text>
</svg>
