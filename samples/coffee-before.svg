  <!-- Cup body -->
  <path d="M110 200 L120 300 Q180 330 240 300 L250 200 Z" fill="white" stroke="#ccc" stroke-width="2"/>
  <!-- Coffee -->
  <ellipse cx="180" cy="210" rx="70" ry="18" fill="#4a2c0a"/>
