  <!-- Handle -->
  <path d="M250 230 Q300 230 300 265 Q300 300 250 290" fill="none" stroke="#ccc" stroke-width="8" stroke-linecap="round"/>
  <!-- Steam -->
  <path d="M160 180 Q155 160 165 140" fill="none" stroke="#ccc" stroke-width="2" opacity="0.6"/>
  <path d="M180 175 Q175 150 185 130" fill="none" stroke="#ccc" stroke-width="2" opacity="0.5"/>
  <path d="M200 180 Q195 155 205 135" fill="none" stroke="#ccc" stroke-width="2" opacity="0.4"/>
  <text x="200" y="380" text-anchor="middle" fill="#999" font-family="sans-serif" font-size="14">Before: Just coffee</text>
