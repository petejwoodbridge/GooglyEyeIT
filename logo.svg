<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="eyeWhite" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </radialGradient>
    <radialGradient id="pupil" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#333333"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Left Eye -->
  <g filter="url(#shadow)">
    <circle cx="175" cy="240" r="130" fill="url(#eyeWhite)" stroke="#555" stroke-width="6"/>
    <circle cx="155" cy="280" r="58" fill="url(#pupil)"/>
    <!-- Shine -->
    <circle cx="140" cy="210" r="18" fill="white" opacity="0.6"/>
  </g>
  <!-- Right Eye -->
  <g filter="url(#shadow)">
    <circle cx="355" cy="230" r="140" fill="url(#eyeWhite)" stroke="#555" stroke-width="6"/>
    <circle cx="380" cy="270" r="62" fill="url(#pupil)"/>
    <!-- Shine -->
    <circle cx="340" cy="195" r="20" fill="white" opacity="0.6"/>
  </g>
</svg>
